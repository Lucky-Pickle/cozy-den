<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CozyWork</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#463a2e; --ink-soft:#6b5d49;
    --panel:#efb59a; --panel2:#f0a78a; --panel-edge:#cf9276;
    --cream:#f4ede0; --cream2:#ece2c8;
    --wood:#9a6239; --wood-dk:#5d381f; --wood-lt:#c08a56; --pix-ink:#3a2414;
    font-family:"Nunito",system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;color:var(--ink);
    background:#211c16;}
  #app{display:flex;height:100vh;width:100vw;}

  /* ---------- ROOM STAGE ---------- */
  #stage{flex:1;position:relative;overflow:hidden;
    background:radial-gradient(120% 100% at 50% 28%,#2c2620 0%,#1d1812 60%,#151009 100%);}
  #worldScale{position:absolute;top:0;left:0;transform-origin:top left;}
  #world{position:relative;width:1320px;height:1180px;}
  .tile{position:absolute;width:205px;height:144px;cursor:pointer;}
  .tile img{width:100%;height:100%;display:block;pointer-events:none;}
  .tile .hl{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .12s;
    background:radial-gradient(60% 38% at 50% 36%,rgba(255,240,190,.34),transparent 70%);}
  .tile:hover .hl{opacity:1;}

  .furn{position:absolute;pointer-events:none;}
  .furn img{display:block;width:100%;height:auto;
    filter:drop-shadow(0 8px 7px rgba(0,0,0,.30));}
  .furn.click{pointer-events:auto;cursor:pointer;}
  /* shaped: pointer events ride on the clipped <img>, so only the visible
     silhouette is hover/click-able (div box stays inert, tooltip uncut). */
  .furn.click.shaped{pointer-events:none;}
  .furn.click.shaped img{pointer-events:auto;}
  .furn.click img{transition:filter .15s ease,transform .12s ease;}
  .furn.click:hover img{filter:drop-shadow(0 0 0 #ffe6a0) drop-shadow(0 0 14px rgba(255,214,120,.9)) drop-shadow(0 8px 7px rgba(0,0,0,.3));transform:translateY(-2px);}
  /* shaped items clip the <img>, which would crop its glow — cast it from the
     un-clipped container instead so it hugs the silhouette. */
  .furn.click.shaped:hover{filter:drop-shadow(0 0 7px #ffe6a0) drop-shadow(0 0 15px rgba(255,214,120,.85));}
  .furn .tip{position:absolute;left:50%;top:-26px;transform:translateX(-50%) translateY(6px);
    background:rgba(40,32,24,.92);color:#fff;font:700 14px/1 "Nunito";padding:6px 10px;border-radius:8px;
    white-space:nowrap;opacity:0;pointer-events:none;transition:.16s;letter-spacing:.02em;}
  .furn.click:hover .tip{opacity:1;transform:translateX(-50%) translateY(0);}
  /* lift the hovered item (and its tip) above neighbouring furniture so the
     tooltip is never painted behind an adjacent piece */
  .furn.click:hover{z-index:1200 !important;}
  /* window hotspot tooltip — same look as furniture tips */
  .hot-tip{position:absolute;transform:translate(-50%,6px);z-index:1300;
    background:rgba(40,32,24,.92);color:#fff;font:700 14px/1 "Nunito";padding:6px 10px;border-radius:8px;
    white-space:nowrap;opacity:0;pointer-events:none;transition:.16s;letter-spacing:.02em;}
  .hot-tip.show{opacity:1;transform:translate(-50%,0);}

  .decal{position:absolute;pointer-events:none;}
  .decal.click{pointer-events:auto;cursor:pointer;}
  .decal .face{position:absolute;inset:0;}

  /* Avatar sprite. ONE combined sheet (4 dirs × 4 frames) set once and NEVER
     swapped — direction = vertical offset (--row), frame = horizontal pan. No
     background-image swap ever happens, so there's no decode/blank flash. */
  #charSprite{position:absolute;left:0;top:0;pointer-events:none;will-change:transform;
    background-repeat:no-repeat;background-size:var(--sheetw) var(--sheeth);
    background-position-x:calc(-1 * var(--cw));background-position-y:var(--row,0px);
    image-rendering:auto;image-rendering:-webkit-optimize-contrast;}
  #charSprite.walking{animation:walkcycle var(--cycle) steps(1) infinite;}
  /* Explicit per-cell holds: each of the 4 frames shows for a quarter of the
     cycle and the pan NEVER passes cell 3 — so the sheet's blank off-edge is
     never shown (that momentary blank at the loop wrap was the "flash"). */
  @keyframes walkcycle{
    0%,  25% { background-position-x: 0; }
    25%, 50% { background-position-x: calc(-1 * var(--cw)); }
    50%, 75% { background-position-x: calc(-2 * var(--cw)); }
    75%,100% { background-position-x: calc(-3 * var(--cw)); }
  }

  /* walls */
  #walls{position:absolute;inset:0;pointer-events:none;}
  .window-hot{position:absolute;cursor:pointer;pointer-events:auto;
    transition:filter .16s;}
  .window-hot:hover{filter:drop-shadow(0 0 8px rgba(255,225,150,.9)) drop-shadow(0 0 18px rgba(255,210,130,.6));}

  /* lights + sparkles */
  #lights{position:absolute;inset:0;pointer-events:none;}
  #lights img{position:absolute;}
  .spark{position:absolute;width:13px;height:13px;border-radius:50%;mix-blend-mode:screen;pointer-events:none;
    background:radial-gradient(circle,rgba(255,238,190,.95),rgba(255,206,120,.5) 45%,transparent 72%);
    animation:flick 2.6s ease-in-out infinite;}
  @keyframes flick{0%,100%{opacity:.35;transform:scale(.8);}50%{opacity:1;transform:scale(1.18);}}

  /* night overlay */
  #nightTint{position:absolute;inset:0;pointer-events:none;z-index:5000;opacity:0;transition:opacity .8s ease;
    background:linear-gradient(180deg,rgba(30,38,92,.5),rgba(14,18,50,.62));mix-blend-mode:multiply;}
  #nightGlow{position:absolute;inset:0;pointer-events:none;z-index:5001;opacity:0;transition:opacity .8s ease;mix-blend-mode:screen;
    background:radial-gradient(420px 320px at 760px 220px,rgba(120,150,235,.22),transparent 72%);}
  #stage.night #nightTint{opacity:1;} #stage.night #nightGlow{opacity:1;}
  #stage.night .spark{filter:brightness(1.5);}

  /* ---------- SIDEBAR ---------- */
  #sidebar{width:252px;flex:none;display:flex;flex-direction:column;gap:14px;
    padding:16px 14px 18px;overflow-y:auto;
    background:linear-gradient(180deg,var(--panel2) 0%,var(--panel) 55%,#e7a184 100%);
    border-left:3px solid var(--panel-edge);box-shadow:-8px 0 26px rgba(0,0,0,.34);z-index:6000;}
  .brand{display:flex;align-items:center;gap:8px;padding:2px 4px 0;}
  .brand b{font-family:"Baloo 2";font-weight:800;font-size:22px;color:#5a4636;letter-spacing:.02em;}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:#7fa069;box-shadow:0 0 0 3px rgba(255,255,255,.4);}
  .topbar{display:flex;justify-content:space-between;gap:6px;}
  .topbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;
    cursor:pointer;padding:0;color:#5a4636;font:700 10.5px/1.15 "Nunito";text-align:center;}
  .topbtn .ic{width:46px;height:46px;border-radius:13px;background:var(--cream);border:2px solid var(--ink-soft);
    display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 #9a886c;transition:transform .08s, background .15s;}
  .topbtn .ic img{width:30px;height:30px;}
  .topbtn:hover .ic{background:#fff4e2;}
  .topbtn:active .ic{transform:translateY(2px);box-shadow:0 1px 0 #9a886c;}
  .topbtn.on .ic{background:#ffd9a8;box-shadow:0 0 0 2px #d98a5a,0 3px 0 #b9794f;}

  /* pixel-art plaque buttons: the sliced PNG (icon baked in) IS the button */
  .pillstack{display:flex;flex-direction:column;gap:9px;padding:4px 2px 8px;background:none;border:none;}
  .pill{position:relative;display:flex;align-items:center;border:none;background:none;cursor:pointer;
    text-align:left;font-family:inherit;padding:0 14px 0 76px;
    background-image:var(--bg);background-size:100% 100%;background-repeat:no-repeat;
    aspect-ratio:440/144;image-rendering:pixelated;
    transition:transform .08s ease,filter .14s ease;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.22));}
  .pill .ic{display:none;}
  .pill:hover{filter:brightness(1.05) drop-shadow(0 0 6px rgba(255,222,140,.85)) drop-shadow(0 2px 2px rgba(0,0,0,.22));}
  .pill:active{transform:translateY(2px);}
  .pill.active{filter:brightness(1.06) drop-shadow(0 0 0 #fffbe8) drop-shadow(0 0 4px rgba(255,240,190,.95)) drop-shadow(0 2px 2px rgba(0,0,0,.22));}
  .pill .lbl{font-family:"Baloo 2";font-weight:800;font-size:14.5px;letter-spacing:.04em;color:#46382a;
    line-height:1.06;text-transform:uppercase;text-shadow:0 1px 0 rgba(255,255,255,.4);}
  .pill.purple{--bg:url(assets/buttons/cosy.png);}   .pill.teal{--bg:url(assets/buttons/mindful.png);}
  .pill.gold{--bg:url(assets/buttons/quick.png);}     .pill.red{--bg:url(assets/buttons/pomodoro.png);}
  .pill.green{--bg:url(assets/buttons/brain.png);}    .pill.blue{--bg:url(assets/buttons/look.png);}
  .pill.cream{--bg:url(assets/buttons/zen.png);}

  .hint{font:600 11px/1.4 "Nunito";color:#7a5e49;text-align:center;opacity:.85;padding:0 6px;}

  /* character picker */
  #picker{position:absolute;top:74px;right:262px;z-index:7000;display:none;
    background:var(--cream);border:3px solid var(--ink-soft);border-radius:18px;padding:14px;
    box-shadow:0 16px 40px rgba(0,0,0,.4);}
  #picker.open{display:block;}
  #picker h4{margin:0 0 10px;font:800 13px "Baloo 2";color:#5a4636;letter-spacing:.03em;}
  #picker .avs{display:flex;gap:10px;}
  #picker .av{width:64px;height:92px;border-radius:14px;cursor:pointer;background:#e9e0cf;border:3px solid transparent;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:6px;transition:.12s;}
  #picker .av:hover{background:#f3ead8;}
  #picker .av.sel{border-color:#d98a5a;background:#ffe6c8;}
  #picker .av img{height:60px;}
  #picker .av span{font:700 9px "Nunito";color:#6b5d49;margin-top:3px;text-transform:capitalize;}

  /* ---------- MODAL (cozy pixel game-window) ---------- */
  #backdrop{position:fixed;inset:0;z-index:8000;display:none;align-items:center;justify-content:center;
    background:radial-gradient(120% 100% at 50% 40%,rgba(20,16,10,.45),rgba(10,8,4,.7));backdrop-filter:blur(2px);}
  #backdrop.open{display:flex;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}

  /* The window is a chunky wooden frame: dark pixel outline -> warm wood plank
     -> dark inner line, all via stacked solid (un-blurred) box-shadow rings so
     the edges stay crisp like game UI. Parchment body sits inside. */
  .modal{width:520px;max-width:90vw;max-height:88vh;display:flex;flex-direction:column;position:relative;
    background:var(--cream);border:5px solid var(--wood);border-radius:20px;overflow:hidden;
    box-shadow:
      0 0 0 3px var(--wood-dk),
      0 0 0 8px var(--pix-ink),
      inset 0 0 0 2px rgba(255,255,255,.35),
      inset 0 3px 0 var(--wood-lt),
      0 30px 60px rgba(0,0,0,.55);
    animation:pop .28s cubic-bezier(.2,1.1,.4,1);}
  .modal.wide{width:760px;}
  /* only "Look Outside" goes near-fullscreen */
  .modal.big{width:1200px;max-width:94vw;height:92vh;max-height:92vh;}
  /* pixel corner studs */
  .modal::before,.modal::after{content:"";position:absolute;width:9px;height:9px;border-radius:2px;
    background:var(--wood-lt);box-shadow:inset 0 0 0 2px var(--wood-dk);z-index:3;pointer-events:none;}
  .modal::before{top:6px;left:6px;}
  .modal::after{top:6px;right:6px;}
  @keyframes pop{from{transform:translateY(14px) scale(.96);opacity:0;}to{transform:none;opacity:1;}}

  .modal-head{display:flex;align-items:center;gap:13px;padding:14px 16px;color:#3f3526;position:relative;
    border-bottom:4px solid var(--wood-dk);
    box-shadow:inset 0 2px 0 rgba(255,255,255,.4),inset 0 -3px 0 rgba(0,0,0,.12);}
  .modal-head .hic{width:46px;height:46px;flex:none;border-radius:11px;background:var(--cream);
    border:none;display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 3px var(--wood-dk),inset 0 2px 0 rgba(255,255,255,.7),0 3px 0 rgba(0,0,0,.18);}
  .modal-head .hic img{width:32px;height:32px;}
  .modal-head h3{margin:0;font:800 19px "Baloo 2";letter-spacing:.05em;text-transform:uppercase;
    text-shadow:0 2px 0 rgba(255,255,255,.45);}
  .modal-head .x{margin-left:auto;width:38px;height:38px;border:none;border-radius:11px;cursor:pointer;
    background:var(--cream);font-size:20px;font-weight:800;color:#3f3526;line-height:1;
    box-shadow:0 0 0 3px var(--wood-dk),inset 0 2px 0 rgba(255,255,255,.7),0 3px 0 rgba(0,0,0,.2);transition:.08s;}
  .modal-head .x:hover{background:#fff4e2;}
  .modal-head .x:active{transform:translateY(2px);box-shadow:0 0 0 3px var(--wood-dk),inset 0 2px 0 rgba(255,255,255,.7),0 1px 0 rgba(0,0,0,.2);}
  /* parchment body: faint warm paper texture */
  .modal-body{padding:20px;overflow-y:auto;color:#3f3526;
    background:
      repeating-linear-gradient(0deg,rgba(154,98,57,.045) 0 2px,transparent 2px 6px),
      var(--cream);}
  /* center + enlarge content only in the big (Look Outside) frame */
  .modal.big .modal-body{flex:1 1 auto;min-height:0;padding:28px;
    display:flex;flex-direction:column;justify-content:center;align-items:center;}
  .modal.big .modal-body > *{width:100%;max-width:1120px;}
  .btn{border:2px solid rgba(0,0,0,.16);border-radius:14px;padding:10px 17px;cursor:pointer;
    font:800 13px/1 "Baloo 2";letter-spacing:.04em;color:#3f3526;background:var(--cream2);
    box-shadow:0 3px 0 rgba(0,0,0,.15);font-family:"Baloo 2";transition:.1s;text-transform:uppercase;}
  .btn:hover{filter:brightness(1.04);} .btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.15);}
  .btn.primary{background:#e8b48f;} .btn.sm{padding:7px 12px;font-size:12px;}
  .row{display:flex;gap:10px;justify-content:center;align-items:center;}

  .videoframe{position:relative;width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;
    border:2px solid var(--ink-soft);background:#1a1a1a;}
  .videoframe iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .note{margin-top:13px;font:600 12.5px/1.5 "Nunito";color:#7a5e49;text-align:center;background:#f7efdf;
    border:1px dashed #cdab87;border-radius:12px;padding:9px 12px;}

  .cosy{display:flex;flex-direction:column;align-items:center;gap:16px;}
  .vinyl{width:124px;height:124px;border-radius:50%;position:relative;flex:none;
    background:repeating-radial-gradient(circle at 50% 50%,#1d1d1d 0 2px,#2a2a2a 2px 4px);box-shadow:inset 0 0 0 6px #161616,0 6px 16px rgba(0,0,0,.3);}
  .vinyl::after{content:"";position:absolute;inset:39%;border-radius:50%;background:#bcaedb;border:3px solid #3f3526;}
  .vinyl.spin{animation:spin 3.4s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
  .stations{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
  .chip{padding:8px 14px;border-radius:13px;border:2px solid rgba(0,0,0,.14);background:#efe6d2;cursor:pointer;
    font:700 13px "Nunito";color:#5a4636;transition:.1s;}
  .chip.sel{background:#bcaedb;color:#33285a;border-color:#9a86c9;}
  .vol{display:flex;align-items:center;gap:10px;width:100%;max-width:340px;}
  .vol input[type=range]{flex:1;accent-color:#d98a5a;height:4px;}
  .nowp{font:800 16px "Baloo 2";letter-spacing:.03em;color:#5a4636;}

  .breath{display:flex;flex-direction:column;align-items:center;gap:18px;}
  .breath .circle{width:154px;height:154px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font:800 16px "Baloo 2";color:#2f4a44;background:radial-gradient(circle at 50% 38%,#cfeae3,#8fbdb4);
    box-shadow:0 0 34px rgba(150,200,190,.55);transition:transform 4s ease-in-out;text-transform:uppercase;letter-spacing:.04em;}

  /* Pomodoro timer */
  .pomo{display:flex;flex-direction:column;align-items:center;gap:22px;padding:6px 0;--pc:#df9d86;}
  .pmodes{display:flex;gap:8px;background:#e9dfc9;padding:5px;border-radius:14px;border:2px solid var(--ink-soft);}
  .pmode{border:none;background:transparent;cursor:pointer;font:800 12px "Baloo 2";text-transform:uppercase;
    letter-spacing:.04em;color:#7a6a52;padding:8px 14px;border-radius:10px;transition:.12s;}
  .pmode.on{background:#fff7e8;color:#5a4636;box-shadow:0 2px 0 rgba(0,0,0,.1);}
  .pdial{position:relative;width:230px;height:230px;}
  .pdial svg{width:100%;height:100%;transform:rotate(-90deg);}
  .pdial .ptrack{fill:none;stroke:rgba(120,95,60,.16);stroke-width:14;}
  .pdial .pfill{fill:none;stroke:var(--pc);stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .25s;}
  .ptime{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .pclock{font:800 50px "Baloo 2";color:#5a4636;letter-spacing:.02em;font-variant-numeric:tabular-nums;}
  .pstate{font:800 13px "Baloo 2";text-transform:uppercase;letter-spacing:.08em;color:var(--pc);filter:brightness(.85);}

  /* floating Pomodoro widget (lives outside the modal/backdrop) */
  #pomoWidget{position:fixed;top:18px;left:18px;z-index:60;width:236px;
    background:var(--cream);border:3px solid var(--ink-soft);border-radius:20px;
    box-shadow:0 12px 30px rgba(40,28,14,.28);overflow:hidden;
    opacity:0;transform:translateY(-10px) scale(.96);pointer-events:none;transition:.18s ease;
    font-family:"Nunito";}
  #pomoWidget.open{opacity:1;transform:none;pointer-events:auto;}
  .pw-head{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#df9d86;
    color:#4a2f24;font-family:"Baloo 2";}
  .pw-head b{font-size:15px;letter-spacing:.02em;flex:1;}
  .pw-dot{width:10px;height:10px;border-radius:50%;background:#fff7e8;box-shadow:0 0 0 3px rgba(255,247,232,.35);}
  .pw-x{border:none;background:rgba(74,47,36,.16);color:#4a2f24;width:24px;height:24px;border-radius:8px;
    cursor:pointer;font-size:17px;line-height:1;font-family:"Baloo 2";transition:.12s;}
  .pw-x:hover{background:rgba(74,47,36,.3);}
  .pw-body{padding:16px 14px 18px;}
  /* compact timer inside the widget */
  .pw-body .pomo{gap:14px;}
  .pw-body .pmodes{gap:5px;padding:4px;}
  .pw-body .pmode{font-size:10px;padding:6px 9px;}
  .pw-body .pdial{width:150px;height:150px;}
  .pw-body .pclock{font-size:34px;}
  .pw-body .pstate{font-size:11px;}

  .games{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
  .gcard{border:2px solid var(--ink-soft);border-radius:16px;overflow:hidden;cursor:pointer;background:#efe6d2;
    display:flex;flex-direction:column;transition:.12s;box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .gcard:hover{transform:translateY(-3px);box-shadow:0 7px 0 rgba(0,0,0,.12);}
  .gthumb{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:44px;
    background:linear-gradient(135deg,#cdbf9f,#b9c7a6);}
  .gcard .gname{padding:8px 10px;font:700 13px "Baloo 2";color:#463a2e;text-align:center;letter-spacing:.02em;}
  .gtag{font:600 10px "Nunito";color:#7a5e49;padding:0 10px 9px;text-align:center;}

  .mem-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font:700 14px "Nunito";gap:10px;}
  .mem{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;max-width:380px;margin:0 auto;}
  .mcard{aspect-ratio:1;border-radius:13px;background:#cdb89a;border:2px solid var(--ink-soft);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .12s;overflow:hidden;}
  .mcard img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .12s;pointer-events:none;}
  .mcard.flip{background:#cfbaa0;}.mcard.flip img{opacity:1;}
  .mcard.matched{border-color:#7fa069;cursor:default;box-shadow:0 0 0 3px rgba(127,160,105,.5);}
  .win{text-align:center;font:800 18px "Baloo 2";margin-top:14px;color:#5a7a48;}

  .zen{text-align:center;padding:8px 4px;}
  .zen .q{font:600 22px/1.5 "Nunito";color:#4a3d2e;text-wrap:balance;min-height:120px;display:flex;align-items:center;justify-content:center;font-style:italic;}
  .zen .meta{font:700 12px "Nunito";color:#9a7a5c;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}

  /* ---------- MOBILE: sidebar becomes a hidden bottom drawer ---------- */
  .drawer-grip{display:none;}
  #menuFab{display:none;}
  #menuScrim{display:none;}

  @media (max-width:768px){
    #app{flex-direction:column;}
    #stage{flex:1 1 auto;width:100%;height:auto;}

    /* sidebar -> bottom sheet, slid out of view until opened */
    #sidebar{position:fixed;left:0;right:0;bottom:0;top:auto;width:auto;flex:none;
      max-height:78vh;border-left:none;border-top:3px solid var(--panel-edge);
      border-radius:22px 22px 0 0;
      box-shadow:0 -10px 30px rgba(0,0,0,.42);
      padding:8px 16px calc(18px + env(safe-area-inset-bottom,0px));
      gap:12px;
      transform:translateY(110%);
      transition:transform .3s cubic-bezier(.2,.9,.3,1);}
    body.menu-open #sidebar{transform:translateY(0);}

    /* grab handle + close row at top of the sheet */
    .drawer-grip{display:flex;flex-direction:column;align-items:center;gap:8px;
      position:sticky;top:0;margin:-8px -16px 0;padding:8px 16px 6px;cursor:pointer;
      background:linear-gradient(180deg,var(--panel2),rgba(240,167,138,0));z-index:2;}
    .drawer-grip .bar{width:46px;height:5px;border-radius:3px;background:rgba(90,70,54,.5);}

    /* pills in 2 columns so the sheet stays compact */
    .pillstack{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    /* % left-pad so the label always clears the icon as pills widen on tablets */
    .pill{padding:0 5% 0 34%;}
    .pill .lbl{font-size:13px;}
    .hint{display:none;}

    /* floating button to open the menu */
    #menuFab{display:flex;align-items:center;gap:9px;position:fixed;z-index:5800;
      right:16px;bottom:calc(16px + env(safe-area-inset-bottom,0px));
      padding:13px 20px 13px 18px;border:none;border-radius:16px;cursor:pointer;
      font:800 15px "Baloo 2";letter-spacing:.03em;text-transform:uppercase;color:#46382a;
      background:linear-gradient(180deg,#f7e9cf,var(--cream2));
      box-shadow:0 0 0 3px var(--wood-dk),inset 0 2px 0 rgba(255,255,255,.7),0 6px 16px rgba(0,0,0,.4);
      transition:transform .12s ease,opacity .2s ease;}
    #menuFab:active{transform:translateY(2px);}
    #menuFab .bars{display:flex;flex-direction:column;gap:4px;}
    #menuFab .bars i{display:block;width:20px;height:3px;border-radius:2px;background:#46382a;}
    body.menu-open #menuFab{opacity:0;pointer-events:none;transform:translateY(8px);}

    /* scrim dims the room while the sheet is open + catches outside taps */
    #menuScrim{display:block;position:fixed;inset:0;z-index:5700;
      background:rgba(20,16,10,.45);opacity:0;pointer-events:none;transition:opacity .3s ease;}
    body.menu-open #menuScrim{opacity:1;pointer-events:auto;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <div id="worldScale">
      <div id="world">
        <svg id="walls" viewBox="0 0 1320 1180"></svg>
        <div id="lights"></div>
        <!-- tiles, furniture, decals, character injected by JS -->
      </div>
    </div>
    <div id="nightTint"></div>
    <div id="nightGlow"></div>
  </div>

  <aside id="sidebar">
    <div class="drawer-grip" id="drawerGrip"><span class="bar"></span></div>
    <div class="brand"><span class="dot"></span><b>CozyWork</b></div>
    <div class="topbar">
      <button class="topbtn" id="btnMute"><span class="ic"><img src="assets/icons/mute.png" alt=""></span><span>Mute All</span></button>
      <button class="topbtn" id="btnChar" style="display:none"><span class="ic"><img src="assets/icons/character.png" alt=""></span><span>Character</span></button>
    </div>
    <div class="pillstack">
      <button class="pill purple" data-act="cosy"><span class="ic"><img src="assets/icons/cosy.png" alt=""></span><span class="lbl">Cosy<br>Beats</span></button>
      <button class="pill teal"   data-act="mindful"><span class="ic"><img src="assets/icons/mindful.png" alt=""></span><span class="lbl">Mindful<br>Breath</span></button>
      <button class="pill gold"   data-act="quick"><span class="ic"><img src="assets/icons/quick.png" alt=""></span><span class="lbl">Quick<br>Stretch</span></button>
      <button class="pill red"    data-act="pomodoro"><span class="ic"><img src="assets/icons/pomodoro.png" alt=""></span><span class="lbl">Pomodoro<br>Timer</span></button>
      <button class="pill green"  data-act="brain"><span class="ic"><img src="assets/icons/brain.png" alt=""></span><span class="lbl">Brain<br>Games</span></button>
      <button class="pill blue"   data-act="look"><span class="ic"><img src="assets/icons/look.png" alt=""></span><span class="lbl">Look<br>Outside</span></button>
      <button class="pill cream"  data-act="zen"><span class="ic"><img src="assets/icons/zen.png" alt=""></span><span class="lbl">Daily Zen</span></button>
    </div>
    <div class="hint">Click an activity, tap an object, or click any floor tile — your avatar will wander over.</div>
  </aside>
</div>

<button id="menuFab" aria-label="Open menu"><span class="bars"><i></i><i></i><i></i></span>Menu</button>
<div id="menuScrim"></div>

<div id="picker">
  <h4>Choose your avatar</h4>
  <div class="avs">
    <div class="av sel" data-av="mauve"><img src="assets/avatar_mauve.png" alt=""><span>mauve</span></div>
    <div class="av" data-av="sage"><img src="assets/avatar_sage.png" alt=""><span>sage</span></div>
    <div class="av" data-av="honey"><img src="assets/avatar_honey.png" alt=""><span>honey</span></div>
  </div>
</div>

<div id="pomoWidget" aria-hidden="true">
  <div class="pw-head">
    <span class="pw-dot"></span><b>Pomodoro</b>
    <button class="pw-x" id="pwClose" aria-label="Close timer">×</button>
  </div>
  <div class="pw-body" id="pwBody"></div>
</div>

<div id="backdrop">
  <div class="modal" id="modal">
    <div class="modal-head" id="modalHead">
      <span class="hic"><img id="modalIcon" alt=""></span>
      <h3 id="modalTitle"></h3>
      <button class="x" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<audio id="bgm" loop></audio>

<script src="cozyden.js"></script>
</body>
</html>
